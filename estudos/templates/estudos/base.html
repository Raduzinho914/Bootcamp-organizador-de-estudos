<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FocusFlow — Organizador de Estudos{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: #252836;
      --accent: #7c6dfa;
      --accent2: #f5a524;
      --green: #22d3a0;
      --red: #f5524a;
      --text: #e8eaf0;
      --text-muted: #7a7f96;
      --radius: 14px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.5px;
    }

    .sidebar-logo span { color: var(--accent); }

    .sidebar-section {
      padding: 20px 16px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .sidebar-link:hover, .sidebar-link.active {
      color: var(--text);
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    .sidebar-link .icon { font-size: 17px; }

    /* ── Main ── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 36px 40px;
      max-width: calc(100vw - 240px);
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* ── Stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }

    .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-family: var(--font-display); font-size: 36px; font-weight: 800; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6b5de0; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-success { background: var(--green); color: #000; }
    .btn-success:hover { opacity: 0.85; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-pendente { background: rgba(245,165,36,.15); color: var(--accent2); }
    .badge-em_andamento { background: rgba(124,109,250,.15); color: var(--accent); }
    .badge-concluido { background: rgba(34,211,160,.15); color: var(--green); }
    .badge-alta { background: rgba(245,82,74,.15); color: var(--red); }
    .badge-media { background: rgba(245,165,36,.15); color: var(--accent2); }
    .badge-baixa { background: rgba(34,211,160,.15); color: var(--green); }
    .badge-atrasada { background: rgba(245,82,74,.2); color: var(--red); }

    /* ── Forms ── */
    .form-grid { display: grid; gap: 18px; }
    .form-grid-2 { grid-template-columns: 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }

    .form-input, .form-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-color {
      width: 48px; height: 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      padding: 2px;
    }

    textarea.form-input { resize: vertical; }

    /* ── Messages ── */
    .messages { margin-bottom: 20px; }
    .message {
      padding: 12px 18px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .message-success { background: rgba(34,211,160,.1); border: 1px solid rgba(34,211,160,.3); color: var(--green); }
    .message-error { background: rgba(245,82,74,.1); border: 1px solid rgba(245,82,74,.3); color: var(--red); }

    /* ── Color dot ── */
    .color-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state p { margin-bottom: 20px; }

    /* ── Sessão block ── */
    .sessao-block {
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 13px;
      border-left: 3px solid;
    }
    .sessao-block .time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Week grid ── */
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .day-col { background: var(--surface2); border-radius: var(--radius); padding: 14px; }
    .day-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }

    /* ── Actions row ── */
    .actions { display: flex; gap: 6px; align-items: center; }

    /* ── Errorlist ── */
    .errorlist { list-style: none; color: var(--red); font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">Focus<span>Flow</span></div>

  <span class="sidebar-section">Geral</span>
  <a href="{% url 'dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
    <span class="icon">🏠</span> Dashboard
  </a>

  <span class="sidebar-section">Gestão</span>
  <a href="{% url 'tarefa_lista' %}" class="sidebar-link {% if 'tarefa' in request.resolver_match.url_name %}active{% endif %}">
    <span class="icon">✅</span> Tarefas
  </a>
  <a href="{% url 'sessao_lista' %}" class="sidebar-link {% if 'sessao' in request.resolver_match.url_name %}active{% endif %}">
    <span class="icon">🗓️</span> Grade Semanal
  </a>
  <a href="{% url 'materia_lista' %}" class="sidebar-link {% if 'materia' in request.resolver_match.url_name %}active{% endif %}">
    <span class="icon">📚</span> Matérias
  </a>
</nav>

<main class="main">
  {% if messages %}
  <div class="messages">
    {% for msg in messages %}
    <div class="message message-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
